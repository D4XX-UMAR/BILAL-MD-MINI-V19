<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BILAL-MD RGB PAIRING</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">

<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;900&family=Rajdhani:wght@300;500;700&display=swap');

:root {
  /* RGB Base Colors */
  --rgb-red: #ff0000;
  --rgb-green: #00ff00;
  --rgb-blue: #0000ff;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #000; /* Dark Black background for RGB pop */
  font-family: 'Rajdhani', sans-serif;
  color: #fff;
  overflow: hidden;
  position: relative;
}

/* Moving RGB Background Grid */
body::before {
  content: "";
  position: absolute;
  inset: 0;
  background: 
    linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px);
  background-size: 50px 50px;
  z-index: -2;
}

/* RGB Real-time Color Changing Animation */
@keyframes rgbText {
  0% { color: #ff0000; text-shadow: 0 0 15px #ff0000; }
  33% { color: #00ff00; text-shadow: 0 0 15px #00ff00; }
  66% { color: #0000ff; text-shadow: 0 0 15px #0000ff; }
  100% { color: #ff0000; text-shadow: 0 0 15px #ff0000; }
}

@keyframes rgbBorder {
  0% { border-color: #ff0000; box-shadow: 0 0 20px #ff0000, inset 0 0 10px #ff0000; }
  33% { border-color: #00ff00; box-shadow: 0 0 20px #00ff00, inset 0 0 10px #00ff00; }
  66% { border-color: #0000ff; box-shadow: 0 0 20px #0000ff, inset 0 0 10px #0000ff; }
  100% { border-color: #ff0000; box-shadow: 0 0 20px #ff0000, inset 0 0 10px #ff0000; }
}

@keyframes rgbBg {
  0% { background: rgba(255, 0, 0, 0.1); }
  33% { background: rgba(0, 255, 0, 0.1); }
  66% { background: rgba(0, 0, 255, 0.1); }
  100% { background: rgba(255, 0, 0, 0.1); }
}

/* RGB Box */
.box {
  width: 100%;
  max-width: 400px;
  padding: 40px 30px;
  border-radius: 20px;
  background: rgba(10, 10, 10, 0.85);
  backdrop-filter: blur(20px);
  border: 2px solid #ff0000;
  animation: rgbBorder 5s linear infinite;
  text-align: center;
  position: relative;
  z-index: 10;
}

/* RGB Text Elements */
.logo-text {
  font-family: 'Orbitron', sans-serif;
  font-size: 32px;
  font-weight: 900;
  animation: rgbText 5s linear infinite;
  margin-bottom: 10px;
}

h3 {
  font-family: 'Orbitron', sans-serif;
  font-size: 18px;
  margin-bottom: 5px;
  animation: rgbText 5s linear infinite;
  animation-delay: -1s;
}

h6 {
  font-size: 14px;
  text-transform: uppercase;
  letter-spacing: 2px;
  margin-bottom: 25px;
  animation: rgbText 5s linear infinite;
  animation-delay: -2s;
}

/* Custom Input RGB */
.input-container {
  display: flex;
  flex-direction: column;
  gap: 15px;
  margin-bottom: 20px;
}

input {
  width: 100%;
  padding: 15px;
  background: #000;
  border: 1px solid #333;
  border-radius: 10px;
  color: #fff;
  font-size: 16px;
  text-align: center;
  outline: none;
  transition: 0.3s;
}

input:focus {
  animation: rgbBorder 3s linear infinite;
}

button {
  padding: 15px;
  border-radius: 10px;
  border: none;
  background: #fff;
  color: #000;
  font-family: 'Orbitron', sans-serif;
  font-weight: 700;
  cursor: pointer;
  transition: 0.4s;
  text-transform: uppercase;
  animation: rgbBg 5s linear infinite; /* Button background changes color */
}

button:hover {
  transform: scale(1.05);
  filter: brightness(1.2);
}

/* Done Button Container */
.input-container button {
  position: relative;
  padding: 15px 18px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
  font-family: 'Orbitron', sans-serif;
  font-weight: 800;
  color: #fff;
  background: #000; /* Button background black rakha hai taake RGB border chamke */
  overflow: hidden; /* Border move karne ke liye zaroori hai */
  transition: 0.4s;
  z-index: 1;
}

/* Moving RGB Border Effect (The Snake) */
.input-container button::before {
  content: "";
  position: absolute;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: conic-gradient(
    #ff0000, #ff7300, #fffb00, #48ff00, 
    #00ffd5, #002bff, #7a00ff, #ff00c8, #ff0000
  );
  animation: rotateRGB 3s linear infinite;
  z-index: -2;
}

/* Inner Cover to make it look like a border */
.input-container button::after {
  content: "";
  position: absolute;
  inset: 3px; /* Border ki thickness yahan se control hogi */
  background: #0d0505; /* Button ka darmyan wala color */
  border-radius: 8px;
  z-index: -1;
}

/* Button Text Glow */
.input-container button {
  text-shadow: 0 0 10px rgba(255, 255, 255, 0.8);
  letter-spacing: 2px;
}

/* Hover Effect */
.input-container button:hover {
  transform: scale(1.05);
  text-shadow: 0 0 20px #fff;
}

/* Rotation Animation */
@keyframes rotateRGB {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}


/* Pairing Code Display */
.code-display {
  margin-top: 20px;
  padding: 20px;
  background: rgba(0,0,0,0.9);
  border-radius: 12px;
  font-family: 'Orbitron', sans-serif;
  font-size: 24px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 15px;
  cursor: pointer;
  animation: rgbBorder 2s linear infinite;
}

#copy-value {
  animation: rgbText 2s linear infinite;
}

#waiting-message {
  display: block;
  margin-top: 10px;
  font-weight: bold;
  animation: rgbText 2s linear infinite;
}

/* Floating RGB Particles */
.particle {
  position: absolute;
  width: 3px; height: 3px;
  border-radius: 50%;
  animation: float 10s linear infinite;
}

@keyframes float {
  from { transform: translateY(100vh) translateX(0); }
  to { transform: translateY(-10vh) translateX(50px); }
}

</style>
</head>

<body>
<div id="particles"></div>

<div class="box">
  <div class="logo-text">👑 BILAL-MD 👑</div>
  <h3>∞🔰 PAIR CODE 🔰∞</h3>
  <h6>❤️ THE REAL RGB EXPERIENCE ❤️</h6>

  <div class="input-container">
    <input placeholder="+923xxxxxxxx" type="tel" id="number">
    <button id="submit">😍 DONE 😍</button>
</div>

  <a id="waiting-message" style="display:none">WAITING FOR SERVER...</a>
  <main id="pair"></main>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.0.0-alpha.1/axios.min.js"></script>

<script>
const a = document.getElementById("pair");
const b = document.getElementById("submit");
const c = document.getElementById("number");
const waitingMessage = document.getElementById("waiting-message");

// Dynamic RGB Particles
function createParticles() {
  const container = document.getElementById("particles");
  const colors = ['#ff0000', '#00ff00', '#0000ff', '#ffff00', '#ff00ff'];
  for (let i = 0; i < 50; i++) {
    let p = document.createElement("div");
    p.className = "particle";
    p.style.left = Math.random() * 100 + "vw";
    p.style.background = colors[Math.floor(Math.random() * colors.length)];
    p.style.boxShadow = `0 0 10px ${p.style.background}`;
    p.style.animationDuration = (5 + Math.random() * 10) + "s";
    p.style.animationDelay = Math.random() * 5 + "s";
    container.appendChild(p);
  }
}
createParticles();

async function Copy() {
  let t = document.getElementById("copy-value").innerText;
  await navigator.clipboard.writeText(t);
  alert("Code Copied! ✅");
}

b.addEventListener("click", async (e) => {
  e.preventDefault();
  if (!c.value) {
    a.innerHTML = "<b style='color:red'>Enter a valid number!</b>";
    return;
  }
  
  waitingMessage.style.display = "block";
  a.innerHTML = "";
  
  try {
    let cleanNumber = c.value.replace(/[^0-9]/g, "");
    let { data } = await axios(`/code?number=${cleanNumber}`);
    waitingMessage.style.display = "none";
    
    a.innerHTML = `
      <div class="code-display" onclick="Copy()">
        <i class="fas fa-copy"></i>
        <span id="copy-value">${data.code}</span>
      </div>
    `;
  } catch (err) {
    waitingMessage.style.display = "none";
    a.innerHTML = "<b style='color:red'>Server Error! Try again.</b>";
  }
});
</script>
</body>
</html>
